<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <title>Michele Bottino | Archivio Digitale Protetto</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Parisienne&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050505; --gold: #d4af37; --cyan: #00ffcc; --music: #ff00ff;
            --glass: rgba(255,255,255,0.03); 
            --font-main: 'Inter', sans-serif;
            
            /* 1. NUOVA DEFINIZIONE DEL MONOGRAMMA MB (PENNA D'OCA) */
            /* Lettere intrecciate, stile corsivo antico, opacità 4%, sfocatura 4px */
            --monogram: url("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='55' text-anchor='middle' font-family='Parisienne, cursive' font-size='60' font-weight='bold' fill='%23d4af37' fill-opacity='0.04' filter='blur(4px)'%3EMB%3C/text%3E%3C/svg%3E");
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg);
            color: #e0e0e0; font-family: var(--font-main); 
            margin: 0; padding-top: env(safe-area-inset-top); overflow-x: hidden;
            line-height: 1.6; scroll-behavior: smooth;

            /* 2. APPLICAZIONE DELLO SFONDO ARALDICO */
            background-image: var(--monogram);
            background-repeat: no-repeat;
            background-position: center 30vh; /* Posizionato centralmente sotto l'header */
            background-attachment: fixed; /* Il monogramma resta fermo mentre il sito scorre */
            background-size: 40vh; /* Dimensione Mobile-First per mostrare MB insieme */
        }

        /* [Il resto del codice rimane invariato, lo riporto per completezza nel file finale] */

        /* NAVIGATION */
        nav { position: sticky; top: 0; background: rgba(5,5,5,0.96); backdrop-filter: blur(15px); z-index: 2000; border-bottom: 1px solid var(--glass); padding: calc(15px + env(safe-area-inset-top)) 20px 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { color: var(--gold); font-weight: 800; letter-spacing: 2px; font-size: 0.9rem; text-transform: uppercase; }
        .hamburger { cursor: pointer; color: var(--gold); font-size: 1.5rem; z-index: 2001; }
        .nav-links { position: fixed; top: 0; right: -100%; width: 100%; height: 100vh; background: rgba(5,5,5,0.99); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; z-index: 1999; }
        .nav-links.active { right: 0; }
        .nav-links a { font-size: 1.6rem; margin: 15px 0; color: #fff; text-decoration: none; text-transform: uppercase; font-weight: 700; }

        /* CONTAINER & HEADER */
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
        header { text-align: center; padding: 80px 10px 60px; }
        h1 { font-size: clamp(2.5rem, 10vw, 4rem); letter-spacing: -3px; color: #fff; margin: 0; line-height: 1; }
        .role-badge { display: inline-block; padding: 6px 18px; border: 1px solid var(--gold); color: var(--gold); border-radius: 30px; font-size: 0.65rem; text-transform: uppercase; margin: 25px 0; letter-spacing: 2px; }
        .bio-box { max-width: 700px; margin: 0 auto 50px; color: #999; text-align: center; font-size: 1.05rem; line-height: 1.7; }

        /* [Mantenere invariato fino alla fine per brevità di lettura] */

    </style>
</head>
<body>
    </body>
</html>
