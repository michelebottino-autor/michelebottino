<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <title>Michele Bottino | Progetto 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --gold: #d4af37; --cyan: #00ffcc; --glass: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding-top: env(safe-area-inset-top); overflow-x: hidden; }

        /* NAVIGATION & HAMBURGER */
        nav { 
            position: sticky; top: 0; background: rgba(5,5,5,0.98); 
            backdrop-filter: blur(15px); z-index: 1000; 
            border-bottom: 1px solid var(--glass); 
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }

        /* STILE MENU MOBILE (Nascosto di base) */
        .hamburger { display: none; cursor: pointer; color: var(--gold); font-size: 1.5rem; }
        
        @media (max-width: 768px) {
            .nav-links {
                display: none; /* Nasconde i link standard */
                flex-direction: column;
                position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
                background: var(--bg); justify-content: center; align-items: center;
                gap: 30px; z-index: 999;
            }
            .nav-links.active { display: flex; } /* Mostra quando attivo */
            .hamburger { display: block; z-index: 1001; }
            .nav-links a { font-size: 1.2rem; } /* Più grandi su mobile */
        }

        /* LAYOUT GENERAL */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        header { text-align: center; padding: 60px 10px 40px; }
        h1 { font-size: clamp(2.2rem, 10vw, 3.5rem); color: #fff; margin: 0; letter-spacing: -2px; }
        
        .panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 30px 20px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        
        .buy-btn { display: inline-block; padding: 12px 20px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; text-align: center; width: 100%; box-sizing: border-box; }
        
        /* FORM CONTACT FIX */
        .contact-grid { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 600px) { .contact-grid { flex-direction: row; } }
        input, textarea { width: 100%; background: var(--glass); border: 1px solid #333; padding: 12px; color: #fff; border-radius: 4px; box-sizing: border-box; }

        footer { text-align: center; padding: 60px 0; border-top: 1px solid var(--glass); font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>

<nav>
    <div style="color:var(--gold); font-weight: 800; letter-spacing: 2px; font-size: 0.8rem;">MB ARCHIVE</div>
    <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
    <div class="nav-links" id="navLinks">
        <a href="#home" onclick="toggleMenu()">Identità</a>
        <a href="#progetti" onclick="toggleMenu()">Opere</a>
        <a href="#musica" onclick="toggleMenu()">Musica</a>
        <a href="#ricerca" onclick="toggleMenu()">Ricerca</a>
        <a href="#contatti" onclick="toggleMenu()">Contatti</a>
    </div>
</nav>

<div class="container" id="home">
    <header>
        <h1>MICHELE BOTTINO</h1>
        <p style="color:var(--gold); letter-spacing:2px; font-size:0.7rem; margin-top:10px;">AUTORE • RICERCATORE</p>
    </header>

    <div id="progetti">
        <section class="panel" style="border: 1px solid var(--gold);">
            <h3>🏛️ IL DEPOSITO DELLE ANIME</h3>
            <blockquote style="border-left:2px solid var(--gold); padding-left:15px; font-style:italic;">
                “Una struttura che funge da anticamera...”
            </blockquote>
            <a href="https://www.amazon.it/dp/B0D47M24V1" target="_blank" rel="noopener" class="buy-btn" style="margin-top:20px;">Acquista</a>
        </section>
    </div>

    <h2 id="musica" style="color:#ff00ff; border-bottom:1px solid rgba(255,0,255,0.1); padding-bottom:10px; margin-top:50px;">🎵 PAROLISTICA</h2>
    <div class="grid" id="grid-musica"></div>

    <h2 id="ricerca" style="color:var(--cyan); border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:10px; margin-top:50px;">🔬 RICERCA 2026</h2>
    <div class="grid" id="grid-ricerca"></div>

    <section id="contatti" class="panel" style="margin-top:60px; border-top:2px solid var(--gold);">
        <h2 style="text-align:center;">CONTATTO</h2>
        <form action="https://formspree.io/f/xeoqnora" method="POST">
            <div class="contact-grid">
                <input type="text" name="name" placeholder="Nome" required>
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <textarea name="message" rows="4" placeholder="Messaggio..." style="margin-top:15px;" required></textarea>
            <button type="submit" class="buy-btn" style="margin-top:15px; background:var(--gold); color:#000; cursor:pointer; border:none; padding:15px;">Invia</button>
        </form>
    </section>

    <footer>
        <p>© 2026 MICHELE BOTTINO | ARCHITETTURA PROTETTA</p>
        <div style="margin-top:20px;">
            <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fmichele-bottino-autor.github.io&count_bg=%23D4AF37&title_bg=%23333333&title=VISITS" alt="Counter">
        </div>
    </footer>
</div>

<script>
    // LOGICA HAMBURGER MENU
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');

    hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        // Cambia icona da barre a X
        const icon = hamburger.querySelector('i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-times');
    });

    function toggleMenu() {
        if(window.innerWidth <= 768) {
            navLinks.classList.remove('active');
            const icon = hamburger.querySelector('i');
            icon.classList.add('fa-bars');
            icon.classList.remove('fa-times');
        }
    }

    // DATI (Invariati)
    const canzoni = [
        { t: "Un’altra Notte a Metà", s: "spotify:album:7tevKrkG2G5bKmBJr6scgH", a: "http://itunes.apple.com/album/id1818425032?ls=1&app=itunes" },
        { t: "Riconquistarti", s: "spotify:album:7B6tNtPLvcgXLrWbCJrLON", a: "https://itunes.apple.com/us/artist/michele-bottino/1815506113" }
    ];

    const ricerca = [
        { t: "Le chiese medievali di Calatabiano", id: "DOI: 10.5281/zenodo.18822734", l: "https://doi.org/10.5281/zenodo.18822734" }
    ];

    function init() {
        document.getElementById('grid-musica').innerHTML = canzoni.map(c => `
            <div class="card" style="border-left:3px solid #ff00ff;">
                <h4 style="margin:0;">${c.t}</h4>
                <div style="margin-top:15px; display:flex; gap:15px;">
                    <a href="${c.s}" target="_blank" rel="noopener" style="color:#1DB954;"><i class="fab fa-spotify"></i></a>
                    <a href="${c.a}" target="_blank" rel="noopener" style="color:#fc3c44;"><i class="fab fa-apple"></i></a>
                    <a href="Https://youtube.com/channel/UCxnPYKas6JqM9h5HrAqwrpQ?si=_EZbVduvknMEFwp7" target="_blank" rel="noopener" style="color:#ff0000;"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
        `).join('');

        document.getElementById('grid-ricerca').innerHTML = ricerca.map(r => `
            <div class="card" style="border-color:rgba(0,255,204,0.1);">
                <h4 style="margin:0; color:var(--cyan);">${r.t}</h4>
                <a href="${r.l}" target="_blank" rel="noopener" class="buy-btn" style="margin-top:15px; border-color:var(--cyan); color:var(--cyan); display:block;">Leggi</a>
            </div>
        `).join('');
    }
    init();
</script>
</body>
</html>
