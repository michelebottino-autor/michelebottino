<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michele Bottino | Ecosistema 2010-2026</title>

    <script type="application/ld+json" id="seoSchema">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Michele Bottino",
      "jobTitle": "Security Software Architect & Author",
      "url": "https://michelebottino-autor.github.io",
      "description": "Ecosistema digitale che unisce saggistica d'inchiesta, narrativa e ricerca scientifica su sicurezza e storia territoriale."
    }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

    <style>
        :root {
            --bg: #050505; --gold: #d4af37; --cyan: #00ffcc; --glass: rgba(255,255,255,0.03);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }
        body { background: var(--bg); color: #e0e0e0; font-family: var(--font); margin: 0; transition: 0.5s; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        /* Modalità */
        body.mode-author { background: radial-gradient(circle at top right, #1a1000, #050505); }
        body.mode-research { background: radial-gradient(circle at top right, #001a1a, #050505); }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass); padding-bottom: 20px; }
        .role-badge { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; padding: 5px 15px; border: 1px solid; border-radius: 20px; }
        
        .switcher button { background: transparent; border: 1px solid var(--glass); color: #888; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .active-gold { border-color: var(--gold) !important; color: var(--gold) !important; box-shadow: 0 0 15px rgba(212,175,55,0.2); }
        .active-cyan { border-color: var(--cyan) !important; color: var(--cyan) !important; box-shadow: 0 0 15px rgba(0,255,204,0.2); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .panel { background: var(--glass); padding: 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .panel:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.1); }

        .terminal { background: #000; border: 1px solid #222; padding: 10px; font-family: monospace; font-size: 0.75rem; color: var(--cyan); width: 100%; box-sizing: border-box; }
        
        #secure-viewer { margin-top: 30px; padding: 25px; background: #000; border: 1px solid #111; border-radius: 8px; filter: blur(10px); opacity: 0.2; transition: 0.8s; }
        .buy-btn { display: inline-block; margin-top: 10px; color: var(--gold); text-decoration: none; font-size: 0.8rem; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 4px; }
        .doi-link { color: var(--cyan); text-decoration: none; font-size: 0.7rem; display: block; margin-top: 5px; }
    </style>
</head>
<body class="mode-author" id="appBody">

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size: 1.5rem;">MICHELE BOTTINO</h1>
            <div id="roleDisplay" class="role-badge" style="color:var(--gold); border-color:var(--gold);">Digital Product Architect</div>
        </div>
        <div class="switcher">
            <button id="btnA" class="active-gold" onclick="updateView('author')">AUTORE (2010)</button>
            <button id="btnR" onclick="updateView('research')">RICERCATORE (2026)</button>
        </div>
    </header>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
        <div class="panel">
            <h4 style="margin:0; color:var(--gold);" id="toolTitle">Integrity Engine</h4>
            <input type="text" id="hashInput" class="terminal" style="margin-top:10px;" placeholder="Incolla ISBN o paragrafo...">
            <button onclick="checkHash()" style="margin-top:10px; width:100%; padding:8px; background:transparent; border:1px solid var(--gold); color:var(--gold); cursor:pointer;">VALIDA DATO</button>
            <div id="hashResult" style="font-size:0.6rem; margin-top:8px; word-break:break-all; color:#666;"></div>
        </div>
        <div class="panel">
            <h4 style="margin:0; color:var(--cyan);">Web3 Auth Node</h4>
            <div id="walletStatus" style="font-size:0.7rem; color:#555; margin: 10px 0;">Status: Locked</div>
            <button onclick="connect()" style="width:100%; padding:8px; background:transparent; border:1px solid var(--cyan); color:var(--cyan); cursor:pointer;">UNLOCK REPOSITORY</button>
        </div>
    </div>

    <div id="contentGrid" class="grid"></div>

    <div id="secure-viewer">
        <div id="viewerContent" style="text-align: center; color: #444;">
            <p>Seleziona un'opera e valida la tua identità per visualizzare i dettagli crittografati.</p>
        </div>
    </div>
</div>

<script>
    // --- DATABASE INTEGRALE ---
    const data = {
        author: [
            { t: "EUROPA: Anatomia di un crimine", id: "979-8335804790", l: "https://www.amazon.it/dp/B0DF65D7S4", d: "Analisi spietata sulle dinamiche di potere nel Vecchio Continente." },
            { t: "L'Uomo Consapevole", id: "979-8327178380", l: "https://www.amazon.it/dp/B0D5S7M5G8", d: "Viaggio filosofico verso il risveglio della coscienza tra filosofia e realtà." },
            { t: "Oniro", id: "979-8328172820", l: "https://www.amazon.it/dp/B0D6V4KHLG", d: "Dove la realtà si dissolve nel sogno. Esplorazione del subconscio." },
            { t: "Intrighi Invisibili", id: "979-8326162311", l: "https://www.amazon.it/dp/B0D4N6MC5L", d: "Thriller sulle cospirazioni silenziose dietro le quinte del potere." },
            { t: "Il deposito delle anime", id: "979-8325608933", l: "https://www.amazon.it/dp/B0D47M24V1", d: "Opera metafisica sul senso ultimo dell'esistenza e l'ignoto." },
            { t: "Stige", id: "979-8324733476", l: "https://www.amazon.it/dp/B0D38K7X6W", d: "Narrazione intensa sulla redenzione, l'oblio e la memoria." }
        ],
        research: [
            { t: "Le chiese medievali di Calatabiano", id: "10.5281/zenodo.18822734", l: "https://doi.org/10.5281/zenodo.18822734", d: "Analisi sistematica su fonti primarie XIII-XVIII secolo." },
            { t: "L'Egemonia dell'Oro Bianco", id: "10.5281/zenodo.18872989", l: "https://doi.org/10.5281/zenodo.18872989", d: "Sintesi critica sulla produzione della canna da zucchero e continuità giuridica." },
            { t: "Spazio e continuità giuridica", id: "10.5281/zenodo.18816887", l: "https://doi.org/10.5281/zenodo.18816887", d: "Analisi microtoponomastica e cartografica del territorio feudale." }
        ]
    };

    let currentMode = 'author';
    let isAuthenticated = false;

    function updateView(mode) {
        currentMode = mode;
        const isA = mode === 'author';
        document.body.className = isA ? 'mode-author' : 'mode-research';
        document.getElementById('btnA').className = isA ? 'active-gold' : '';
        document.getElementById('btnR').className = isA ? '' : 'active-cyan';
        document.getElementById('roleDisplay').innerText = isA ? 'Digital Product Architect' : 'Security Software Architect';
        document.getElementById('roleDisplay').style.color = isA ? 'var(--gold)' : 'var(--cyan)';
        document.getElementById('roleDisplay').style.borderColor = isA ? 'var(--gold)' : 'var(--cyan)';
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('contentGrid');
        grid.innerHTML = data[currentMode].map(item => `
            <div class="panel" onclick="loadViewer('${item.id}')">
                <small style="color:#666;">${currentMode === 'author' ? 'ISBN: '+item.id : 'DOI: '+item.id}</small>
                <h4 style="margin:10px 0;">${item.t}</h4>
                <p style="font-size:0.7rem; color:#aaa;">${item.d.substring(0,80)}...</p>
                ${currentMode === 'author' ? `<a href="${item.l}" target="_blank" class="buy-btn">Store Amazon</a>` : `<a href="${item.l}" target="_blank" class="doi-link">View on Zenodo</a>`}
            </div>
        `).join('');
    }

    async function connect() {
        if (window.ethereum) {
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            isAuthenticated = true;
            document.getElementById('walletStatus').innerText = "Status: Authenticated 0x...V1";
            document.getElementById('walletStatus').style.color = "var(--cyan)";
            document.getElementById('secure-viewer').style.filter = "none";
            document.getElementById('secure-viewer').style.opacity = "1";
        } else {
            alert("Security Alert: Wallet non trovato.");
        }
    }

    function loadViewer(id) {
        const item = data[currentMode].find(x => x.id === id);
        if(!item) return;
        document.getElementById('viewerContent').innerHTML = `
            <h2 style="color:${currentMode === 'author' ? 'var(--gold)' : 'var(--cyan)'};">${item.t}</h2>
            <p style="line-height:1.6;">${item.d}</p>
            <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
            <small>Identificativo Univoco: ${item.id}</small>
        `;
    }

    function checkHash() {
        const input = document.getElementById('hashInput').value;
        const hash = CryptoJS.SHA256(input).toString();
        document.getElementById('hashResult').innerText = "SHA-256 GENERATO: " + hash;
    }

    // Init
    updateView('author');
</script>
</body>
</html>
