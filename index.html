<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Michele Bottino | Archivio Digitale Protetto</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;600&family=Parisienne&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #050505; --gold: #d4af37; --cyan: #00ffcc; --music: #ff00ff; --glass: rgba(255,255,255,0.03); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* MONOGRAMMA MB - FILIGRANA FLUTTUANTE */
        .watermark-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; display: flex; justify-content: center; align-items: center; }
        .mb-sigillo { font-family: 'Parisienne', cursive; font-size: 30vw; color: var(--gold); opacity: 0.06; filter: blur(3px); white-space: nowrap; transform: translateY(-5vh); }

        /* HEADER & NAV */
        nav { position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); z-index: 1000; padding: 20px; border-bottom: 1px solid rgba(212,175,55,0.1); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 3px; font-weight: 700; font-size: 0.8rem; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 10; }
        header { text-align: center; padding: 120px 10px 80px; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 3.5rem); color: #fff; letter-spacing: 2px; }
        .badge { display: inline-block; padding: 5px 20px; border: 1px solid var(--gold); color: var(--gold); border-radius: 30px; font-size: 0.6rem; text-transform: uppercase; margin: 20px 0; letter-spacing: 2px; }

        /* SEZIONI */
        h2 { font-family: 'Cinzel', serif; font-size: 0.9rem; text-transform: uppercase; color: var(--gold); margin: 60px 0 30px; letter-spacing: 4px; display: flex; align-items: center; }
        h2::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--gold), transparent); margin-left: 20px; opacity: 0.3; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); padding: 30px; border-radius: 4px; backdrop-filter: blur(5px); transition: 0.4s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        .btn-link { display: inline-block; margin-top: 20px; color: var(--gold); text-decoration: none; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--gold); padding-bottom: 2px; transition: 0.3s; }
        .btn-link:hover { letter-spacing: 2px; opacity: 0.8; }

        /* YOUTUBE STYLE FOR MUSIC */
        .music-card { border-left: 3px solid var(--music); }
        .yt-icon { color: #ff0000; margin-right: 8px; }

        footer { text-align: center; padding: 100px 0; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 100px; }
        .counter-text { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--gold); opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="watermark-wrap"><div class="mb-sigillo">MB</div></div>

    <nav><div class="logo">ARCHIVIO DIGITALE 2026</div><i class="fas fa-bars" style="color:var(--gold)"></i></nav>

    <div class="container">
        <header>
            <h1>MICHELE BOTTINO</h1>
            <div class="badge">Digital Product Architect • Autore • Ricercatore</div>
            <p style="color:#888; max-width:600px; margin:0 auto; font-size:0.95rem; font-weight:300;">
                Dal 2010 la narrazione, dal 2026 la scienza. Un unico ecosistema di protezione e creazione intellettuale.
            </p>
        </header>

        <section id="musica">
            <h2>🎵 Parolistica & YouTube</h2>
            <div class="grid" id="yt-grid">
                </div>
        </section>

        <section id="ricerca">
            <h2 style="color:var(--cyan)">🔬 Ricerca Scientifica</h2>
            <div class="grid" id="ricerca-grid"></div>
        </section>

        </div>

    <footer>
        <p>© 2026 MICHELE BOTTINO</p>
        <div class="counter-text" id="visit-counter">ACCESS PROTOCOL: ACTIVE</div>
    </footer>

<script>
    const dbMusic = [
        { t: "Un’altra Notte a Metà", y: "https://www.youtube.com/@michelebottino" },
        { t: "Riconquistarti", y: "https://www.youtube.com/@michelebottino" },
        { t: "Casanova", y: "https://www.youtube.com/@michelebottino" },
        { t: "Stige Theme", y: "https://www.youtube.com/@michelebottino" }
    ];

    const dbRicerca = [
        { t: "L'Egemonia dell'Oro Bianco", d: "DOI: 10.5281/zenodo.18872989", u: "https://zenodo.org/records/18872989" },
        { t: "Investitura Baronia 1487", d: "DOI: 10.5281/zenodo.18812067", u: "https://doi.org/10.5281/zenodo.18812067" }
    ];

    // Rendering
    document.getElementById('yt-grid').innerHTML = dbMusic.map(m => `
        <div class="card music-card">
            <h3 style="font-size:1rem; color:#fff;">${m.t}</h3>
            <a href="${m.y}" target="_blank" class="btn-link"><i class="fab fa-youtube yt-icon"></i> Guarda su YouTube</a>
        </div>
    `).join('');

    document.getElementById('ricerca-grid').innerHTML = dbRicerca.map(r => `
        <div class="card">
            <h3 style="font-size:0.9rem; color:#fff;">${r.t}</h3>
            <code style="display:block; margin:10px 0; font-size:0.6rem; color:var(--cyan);">${r.d}</code>
            <a href="${r.u}" target="_blank" class="btn-link">Apri Archivio</a>
        </div>
    `).join('');
</script>
</body>
</html>
